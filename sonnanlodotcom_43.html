<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>컬처온도 - 문화생활 온도 랭킹</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#111114;color:#ededf0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes skl{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
:root{--bg:#111114;--sf:#1a1a20;--card:#1e1e28;--bd:#2a2a38;--bdL:#21212e;--tx:#ededf0;--sub:#8d8da0;--mu:#505068;--hot:#ff5e3a;--warm:#ff9500;--cool:#4fc3f7;}
.sk{background:linear-gradient(90deg,#1e1e28 0%,#252530 50%,#1e1e28 100%);background-size:200px 100%;animation:skl 1.3s ease-in-out infinite;border-radius:6px}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
.page{display:none;animation:fi 0.25s ease;padding-bottom:72px}
.page.active{display:block}
.login-page{padding-bottom:0!important;min-height:100vh}
/* ── 네비게이션 바 ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(17,17,20,0.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;
  padding:6px 4px 16px;
  z-index:100;gap:0;
}
.bnav-i{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;
  color:var(--mu);padding:6px 2px;
  border-radius:10px;
  transition:all 0.2s;position:relative;
}
.bnav-i:hover{color:var(--sub)}
.bnav-i.on{color:var(--hot)}
/* 활성 탭 — 아이콘 배경 박스 하이라이트 */
.bnav-i .nav-ic{
  width:36px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:all 0.25s;
}
.bnav-i.on .nav-ic{
  background:rgba(255,94,58,0.14);
}
.bnav-i svg{width:19px;height:19px;transition:all 0.2s}
.bnav-i span{font-size:9px;font-weight:500;letter-spacing:-0.01em;transition:all 0.2s}
.bnav-i.on span{font-weight:700;color:var(--hot)}
/* 랭킹 중앙 버튼 */
.bnav-center{
  flex:1;
  border:none;
  background:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  padding:6px 2px;
  gap:3px;
}
/* 플로팅 버튼 본체 */
.bnav-center-btn{
  display:flex;align-items:center;justify-content:center;
  width:46px;height:46px;border-radius:15px;
  background:linear-gradient(145deg,#ff6a3a,#ff2d55);
  box-shadow:0 -3px 12px rgba(255,60,40,0.38),0 3px 10px rgba(255,60,40,0.28);
  border:1.5px solid rgba(255,255,255,0.12);
  transform:translateY(-6px);
  transition:all 0.2s ease;
}
.bnav-center:active .bnav-center-btn{transform:translateY(-6px) scale(0.93)}
.bnav-center.on .bnav-center-btn{
  box-shadow:0 -4px 16px rgba(255,60,40,0.55),0 3px 12px rgba(255,60,40,0.38);
}
.bnav-center-label{
  font-size:9px;font-weight:600;letter-spacing:-0.01em;
  color:var(--mu);
  transform:translateY(-4px);
  transition:all 0.2s;
}
.bnav-center.on .bnav-center-label{color:var(--hot);font-weight:700}
.nav-thermo-fill{transition:height 0.5s ease}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px}
.hdr h1{font-size:18px;font-weight:800}
.hdr-btn{background:none;border:none;color:var(--sub);padding:0}
/* 히어로 슬라이더 */
.hero-slider{position:relative;margin:0 20px 20px;border-radius:16px;overflow:hidden;height:180px;background:var(--card)}
.hero-track{display:flex;width:100%;height:100%;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.hero-slide{flex:0 0 100%;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:64px}
.hero-ov{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(17,17,20,0.93));display:flex;flex-direction:column;justify-content:flex-end;padding:18px}
.hero-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;background:var(--hot);color:#fff;font-size:10.5px;font-weight:700;width:fit-content;margin-bottom:8px}
.hero-title{font-size:17px;font-weight:800;line-height:1.3}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:3px}
.hero-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);transition:all 0.3s;cursor:pointer}
.hero-dot.on{width:20px;border-radius:3px;background:#fff}
/* 큐레이션 테마 그리드 */
.curation-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px;margin-bottom:24px}
.curation-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;height:110px;display:flex;align-items:flex-end;padding:14px 14px;border:1px solid rgba(255,255,255,0.06);transition:transform 0.15s}
.curation-card:active{transform:scale(0.97)}
.curation-card.wide{grid-column:span 2;height:96px}
/* 배경 레이어 */
.cc-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center}
.cc-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(160deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.55) 100%)}
.cc-icon{position:absolute;top:12px;right:12px;width:32px;height:32px;z-index:2;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);border-radius:8px;backdrop-filter:blur(4px)}
.cc-body{position:relative;z-index:2}
.cc-title{font-size:15px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:2px;letter-spacing:-0.02em;text-shadow:0 1px 4px rgba(0,0,0,0.4)}
.cc-count{font-size:10.5px;color:rgba(255,255,255,0.75);font-weight:500}
/* 핫온도 카드 (wide, 특별 스타일) */
.curation-card.hot-card{grid-column:span 2;height:80px;background:linear-gradient(135deg,#ff5e3a,#ff2d55)}
.hot-card-inner{display:flex;align-items:center;gap:16px;width:100%}
.hot-card-thermo{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.hot-card-tube{width:10px;height:36px;border-radius:5px 5px 0 0;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-bottom:none;overflow:hidden;position:relative}
.hot-card-fill{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:3px 3px 0 0}
.hot-card-bulb{width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,0.8)}
.hot-card-body{flex:1}
.hot-card-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.75);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px}
.hot-card-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.03em}
.hot-card-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.hot-card-arrow{font-size:20px;color:rgba(255,255,255,0.6);flex-shrink:0}
/* 카드 스크롤 */
.h-scroll{display:flex;gap:12px;padding:0 20px 4px;overflow-x:auto;scrollbar-width:none;margin-bottom:24px}
.h-card{flex:0 0 auto;width:140px;cursor:pointer}
.h-card-img{width:140px;height:186px;border-radius:10px;overflow:hidden;margin-bottom:8px;background:var(--card);position:relative;display:flex;align-items:center;justify-content:center;font-size:44px}
.h-card-temp{position:absolute;top:8px;right:8px;padding:3px 7px;border-radius:8px;font-size:11px;font-weight:800}
.h-card-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-card-sub{font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-card-date{font-size:10px;color:var(--mu);margin-top:2px}
/* 종료임박 */
.dl-list{padding:0 20px;margin-bottom:24px}
.dl-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdL);cursor:pointer}
.dl-thumb{width:56px;height:56px;border-radius:10px;flex-shrink:0;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:24px}
.dl-info{flex:1;min-width:0}
.dl-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.dl-meta{font-size:11.5px;color:var(--sub)}
.dl-dday{flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700;background:rgba(255,94,58,0.12);color:var(--hot);border:1px solid rgba(255,94,58,0.2)}
/* 랭킹 */
/* ── 랭킹 카테고리 탭 ── */
.rk-cat-tabs{display:flex;border-bottom:1px solid var(--bdL);overflow-x:auto;scrollbar-width:none}
.rk-cat-tab{flex:0 0 auto;padding:12px 16px;font-size:13px;font-weight:500;color:var(--mu);background:transparent;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all 0.2s;white-space:nowrap;text-align:center;cursor:pointer}
.rk-cat-tab.on{font-weight:800;color:var(--hot);border-bottom-color:var(--hot)}
/* 랭킹 기간 탭 + 지역 필터 바 */
.rk-ctrl-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;gap:8px}
.rk-period-tabs{display:flex;background:var(--sf);border-radius:10px;padding:3px;border:1px solid var(--bd);height:36px;align-items:center}
.rk-period-tab{padding:0 14px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--sub);background:transparent;border:none;transition:all 0.18s;cursor:pointer;height:30px;display:flex;align-items:center}
.rk-period-tab.on{font-weight:700;color:var(--tx);background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,0.4)}
.rk-region-btn{display:flex;align-items:center;gap:5px;padding:0 12px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--sub);font-size:12.5px;font-weight:600;cursor:pointer;transition:all 0.15s;height:36px;white-space:nowrap}
.rk-region-btn.active{color:var(--hot);border-color:var(--hot);background:rgba(255,94,58,0.08)}
.rk-region-btn svg{width:14px;height:14px;flex-shrink:0}
.meta-bar{padding:2px 20px 8px;font-size:11.5px;color:var(--mu)}
/* ── 지역 바텀시트 ── */
.region-sheet{position:fixed;inset:0;z-index:250;display:none}
.region-sheet.show{display:block}
.region-dim{position:absolute;inset:0;background:rgba(0,0,0,0.6)}
.region-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sf);border-radius:20px 20px 0 0;border:1px solid var(--bd);padding:0 0 32px;animation:slideUp 0.28s ease}
.region-handle{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:12px auto 16px}
.region-title{font-size:15px;font-weight:800;padding:0 20px 14px;border-bottom:1px solid var(--bdL)}
.region-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 20px}
.region-item{padding:10px 4px;border-radius:10px;border:1.5px solid var(--bd);background:var(--card);color:var(--sub);font-size:13px;font-weight:600;text-align:center;cursor:pointer;transition:all 0.15s}
.region-item.on{color:#fff;background:var(--hot);border-color:var(--hot)}
.rk{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--bdL);cursor:pointer;transition:background 0.12s}
.rk:hover{background:var(--sf)}
.rk-n{width:30px;text-align:center;flex-shrink:0;margin-right:6px}
.rk-n-v{font-size:17px;font-weight:800;line-height:1}
.rk-ch{margin-top:3px;font-size:10px;font-weight:700;line-height:1}
.rk-ch.up{color:var(--hot)}.rk-ch.dn{color:var(--cool)}.rk-ch.sm{color:var(--mu)}
.rk-img{width:50px;height:66px;border-radius:5px;overflow:hidden;flex-shrink:0;margin-right:12px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:22px}
.rk-info{flex:1;min-width:0;margin-right:10px}
.rk-title{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;line-height:1.2}
.rk-sub{font-size:11.5px;color:var(--sub);display:flex;flex-direction:column;gap:2px}
.rk-sub-loc{display:flex;align-items:center;gap:3px}
.rk-sub-date{font-size:10.5px;color:var(--mu)}
/* 온도 게이지 (원형 - 상세/홈 등 유지) */
.gauge{flex-shrink:0;position:relative}
.gauge svg{width:100%;height:100%}
.gauge-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.gauge-num{font-size:13px;font-weight:800}
/* 온도계 바 (랭킹 리스트 전용) */
.thermo{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;width:46px;cursor:pointer}
.thermo-tube{width:10px;height:52px;border-radius:6px 6px 0 0;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-bottom:none;overflow:hidden;position:relative}
.thermo-mercury{position:absolute;bottom:0;left:0;right:0;border-radius:4px 4px 0 0;transition:height 0.9s cubic-bezier(0.34,1.56,0.64,1)}
.thermo-bulb{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.1);margin-top:0;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.thermo-num{font-size:11.5px;font-weight:800;margin-top:3px;line-height:1}
/* 캘린더 */
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 20px}
.cal-nav button{background:none;border:none;color:var(--sub);font-size:18px;padding:6px;cursor:pointer}
.cal-month{font-size:17px;font-weight:800;min-width:120px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;margin-bottom:8px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--mu);padding:8px 0}
.cal-day{text-align:center;padding:6px 2px;cursor:pointer;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:10px}
.cal-day.today .cal-d{background:var(--hot);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cal-day.other{opacity:0.25}
.cal-d{font-size:13px;font-weight:600;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cal-dots{display:flex;gap:2px;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-events{padding:0 20px}
.cal-date-hdr{font-size:14px;font-weight:700;padding:12px 0 8px;border-bottom:1px solid var(--bdL);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.cal-ev{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdL);cursor:pointer}
.cal-ev-thumb{width:48px;height:48px;border-radius:8px;flex-shrink:0;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px}
.cal-ev-info{flex:1;min-width:0}
.cal-ev-title{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev-meta{font-size:11.5px;color:var(--sub)}
.cal-ev-cat{flex-shrink:0;padding:3px 8px;border-radius:6px;font-size:10.5px;font-weight:600;background:var(--sf);color:var(--sub);border:1px solid var(--bd)}
/* 마이페이지 */
.my-hdr{padding:18px 20px 8px}
.my-hdr h1{font-size:22px;font-weight:800}
.my-stats{display:flex;gap:10px;padding:0 20px 16px}
.my-stat{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.my-stat-v{font-size:22px;font-weight:800;color:var(--hot)}
.my-stat-l{font-size:10.5px;color:var(--sub);margin-top:3px;font-weight:600}
.my-tabs{display:flex;border-bottom:1px solid var(--bdL);margin-bottom:8px}
.my-tab{flex:1;padding:12px 0;font-size:13.5px;font-weight:500;color:var(--mu);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
.my-tab.on{color:var(--tx);font-weight:700;border-bottom-color:var(--hot)}
/* 상세 */
.det-hero{position:relative;height:220px;background:linear-gradient(135deg,#1a1a28,#2a1a20);display:flex;align-items:center;justify-content:center;font-size:90px;overflow:hidden}
.det-hero-grad{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,var(--bg))}
.det-top-actions{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:5}
.det-top-right{display:flex;gap:8px}
.det-ico{width:38px;height:38px;border-radius:12px;border:none;background:rgba(0,0,0,0.5);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.det-ico.on{background:rgba(255,94,58,0.9)}
.det-poster-wrap{position:relative;margin:-60px 20px 16px;display:flex;gap:14px;align-items:flex-end;z-index:10}
.det-poster{width:96px;height:128px;border-radius:10px;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.5);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:44px}
.det-poster-info{flex:1;min-width:0;padding-bottom:4px}
.det-badges{display:flex;gap:5px;margin-bottom:6px}
.det-badge{padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:700}
.det-cat-text{font-size:11px;color:var(--sub);font-weight:600}
.det-title-sec{padding:0 20px 16px}
.det-title{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:10px}
.det-sub{font-size:12.5px;color:var(--sub);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.det-sub .dot{width:3px;height:3px;border-radius:50%;background:var(--mu)}
.det-temp{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;margin:0 20px 20px}
.det-temp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.det-temp-body{flex:1}
.det-temp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.det-temp-label{font-size:10.5px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.det-temp-v{font-size:18px;font-weight:800}
.det-temp-bar{width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.det-temp-fill{height:100%;border-radius:3px}
.quick-bar{display:flex;padding:0 20px 20px}
.quick-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:none;border:none;color:var(--sub);cursor:pointer;border-right:1px solid var(--bdL)}
.quick-btn:last-child{border-right:none}
.quick-btn.active{color:var(--hot)}
.quick-btn svg{width:20px;height:20px}
.qb-label{font-size:10.5px;font-weight:600}
.qb-count{font-size:9px;opacity:0.7}
.info-card{background:var(--sf);border-radius:14px;margin:0 20px 16px;border:1px solid var(--bd);overflow:hidden}
.info-row{display:flex;align-items:flex-start;gap:0;padding:13px 16px;border-bottom:1px solid var(--bdL)}
.info-row:last-child{border-bottom:none}
.info-l{font-size:10.5px;color:var(--mu);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em}

// 캐시 — 5분 유지
var _cache=null,_cacheTime=0;
function loadEvents(callback){
  var now=Date.now();
  if(_cache&&(now-_cacheTime)<300000){
    applyLocalReactions(_cache);
    callback(_cache);
    return;
  }
  fetch(API_URL)
    .then(function(r){return r.json();})
    .then(function(data){
      _cache=data.events||[];
      _cacheTime=Date.now();
      ev=_cache;
      applyLocalReactions(ev);
      callback(ev);
    })
    .catch(function(err){
      console.error('API 오류:',err);
      // API 실패시 캐시 사용
      if(_cache){callback(_cache);}
      else{callback([]);}
    });
}
function applyLocalReactions(events){
  var vcMap=JSON.parse(localStorage.getItem('snr_vc')||'{}');
  var lcMap=JSON.parse(localStorage.getItem('snr_lc')||'{}');
  var bcMap=JSON.parse(localStorage.getItem('snr_bc')||'{}');
  liked=new Set(JSON.parse(localStorage.getItem('snr_lk')||'[]'));
  events.forEach(function(e){
    if(vcMap[e.id])e.vc=(Number(e.vc)||0)+vcMap[e.id];
    if(lcMap[e.id])e.lc=(Number(e.lc)||0)+lcMap[e.id];
    e.bc=bcMap[e.id]||0;
  });
}

function sc(e,allEv){
  var d=dd(e.ed);
  if(e.st==='ended'||d<0)return 0;
  var arr=allEv||ev;
  var score=0;

  // ① 네이버 검색량 (0~100 상대값 → 최대 30점)
  var ns=Number(e.naver_score)||0;
  score+=ns*0.3;

  // ② 긴급도 — 마감 임박 (최대 25점)
  if(d<=3)score+=25;
  else if(d<=7)score+=15;
  else if(d<=14)score+=7;

  // ③ 긴급도 — 신규 오픈 (최대 10점)
  if(e.ca){
    var a=Math.ceil((NOW-new Date(e.ca))/864e5);
    if(a<=7)score+=10;
  }

  // ④ 희소성 — 행사 기간 짧을수록 (최대 12점)
  if(e.sd&&e.ed){
    var span=Math.ceil((new Date(e.ed)-new Date(e.sd))/864e5);
    if(span<=7)score+=12;
    else if(span<=14)score+=6;
  }

  // ⑤ 접근성 — 무료입장 (8점)
  if(Number(e.fr)===1)score+=8;

  // ⑥ 사용자 반응 — 전체 최대값 대비 상대점수
  var maxVc=1,maxLc=1,maxBc=1;
  arr.forEach(function(x){
    if((x.vc||0)>maxVc)maxVc=x.vc||0;
    if((x.lc||0)>maxLc)maxLc=x.lc||0;
    if((x.bc||0)>maxBc)maxBc=x.bc||0;
  });
  score+=((e.vc||0)/maxVc)*15;  // 조회수 최대 15점
  score+=((e.lc||0)/maxLc)*15;  // 좋아요 최대 15점
  score+=((e.bc||0)/maxBc)*10;  // 저장   최대 10점

  return Math.round(score);
}

function goTag(type,val){go("tag",type+"::"+val);}
function goCuration(cid){
  var curations=getCurations();
  var c=curations.find(function(x){return x.id===cid;});
  if(!c)return;
  if(c.tags[0]==="__closing__"){
    // 종료임박 — 특수 태그
    go("tag","__closing__::"+c.title);
  } else {
    // 첫 번째 태그로 이동 (복합 태그는 태그페이지에서 처리)
    go("tag","curation::"+cid);
  }
}
function renderTagPage(key){
  var parts=(key||"").split("::");
  var type=parts[0],val=parts[1]||"";
  var typeCls={district:"tag-district",vibe:"tag-vibe",keyword:"tag-keyword",curation:"tag-vibe",__closing__:"tag-keyword",catTop:"tag-district",hotOndo:"tag-district"};
  var typeLabel={district:"지역",vibe:"분위기",keyword:"키워드",curation:"테마",__closing__:"테마",catTop:"컬처 핫온도",hotOndo:"컬처 핫온도"};
  var matched,pageTitle=val;
  if(type==="hotOndo"){
    // 카테고리별 1위만 추출해서 온도순 정렬
    pageTitle="컬처 핫온도";
    var _catTops={};
    CATS.forEach(function(cat){
      if(cat==="전체")return;
      var list=ev.filter(function(e){return e.ct===cat&&e.st!=="ended";}).map(function(e){return Object.assign({},e,{_s:sc(e,ev)});}).sort(function(a,b){return b._s-a._s;});
      if(list.length)_catTops[cat]=list[0];
    });
    matched=Object.values(_catTops).sort(function(a,b){return b._s-a._s;});
  } else if(type==="catTop"){
    // 해당 카테고리 전체를 온도순으로 - 1위가 맨 위
    pageTitle=val+' 랭킹';
    matched=ev.filter(function(e){return e.ct===val&&e.st!=="ended";});
  } else if(type==="__closing__"){
    matched=ev.filter(function(e){return dd(e.ed)>=0&&dd(e.ed)<=7&&e.st==="ongoing";});
  } else if(type==="curation"){
    var cur=(getCurations()).find(function(x){return x.id===val;});
    if(!cur){matched=[];} else {
      pageTitle=cur.title;
      matched=ev.filter(function(e){
        return cur.tags.some(function(t){return(e.vibes||[]).indexOf(t)>=0||(e.tags||[]).indexOf(t)>=0;});
      });
    }
  } else if(type==="district"){matched=ev.filter(function(e){return e.district===val;});}
  else if(type==="vibe"){matched=ev.filter(function(e){return(e.vibes||[]).indexOf(val)>=0;});}
  else if(type==="keyword"){matched=ev.filter(function(e){return(e.tags||[]).indexOf(val)>=0;});}
  else{matched=[];}
  var all=ev.map(function(x){return Object.assign({},x,{_s:sc(x)});}).sort(function(a,b){return b._s-a._s;});
  var mx=all.length?all[0]._s:1;
  var h='<div class="hdr">'
    +'<button class="hdr-btn" onclick="go(\'home\')" style="margin-right:8px"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
    +'<div style="flex:1"><div style="font-size:11px;color:var(--mu);font-weight:600;margin-bottom:2px">'+(typeLabel[type]||"태그")+'</div>'
    +'<span style="font-size:16px;font-weight:800">'+pageTitle+'</span></div>'
    +'<span style="font-size:12px;color:var(--mu);font-weight:600">'+matched.length+'건</span></div>';
  // 관련 태그 (district/vibe/keyword만)
  if(type==="district"||type==="vibe"||type==="keyword"){
    var relTags={};
    matched.forEach(function(e){
      if(e.district&&e.district!==val)(relTags["district::"+e.district]=relTags["district::"+e.district]||{type:"district",val:e.district,cnt:0}).cnt++;
      (e.vibes||[]).forEach(function(v){if(v!==val)(relTags["vibe::"+v]=relTags["vibe::"+v]||{type:"vibe",val:v,cnt:0}).cnt++;});
      (e.tags||[]).forEach(function(t){if(t!==val)(relTags["keyword::"+t]=relTags["keyword::"+t]||{type:"keyword",val:t,cnt:0}).cnt++;});
    });
    var relArr=Object.values(relTags).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,8);
    if(relArr.length){h+='<div style="padding:8px 20px 14px;border-bottom:1px solid var(--bdL)"><div style="font-size:11px;color:var(--mu);font-weight:600;margin-bottom:8px">관련 태그</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+relArr.map(function(r){return'<span class="tag '+typeCls[r.type]+'" style="font-size:11px" onclick="goTag(\''+r.type+'\',\''+r.val+'\')">'+(r.type==="keyword"?"#"+r.val:r.val)+'</span>';}).join('')+'</div></div>';}
  }
  if(!matched.length){
    h+='<div class="empty"><div style="font-size:48px;margin-bottom:14px">🏷️</div><p style="font-weight:700;margin-bottom:6px">연결된 이벤트가 없어요</p></div>';
  } else {
    matched.map(function(e){return Object.assign({},e,{_s:sc(e,ev)});}).sort(function(a,b){return b._s-a._s;}).forEach(function(e,i){
      var t=tc(e._s,mx);
      h+='<div class="rk" onclick="viewEv(\''+e.id+'\')" style="animation:si 0.3s ease '+(i*0.05)+'s both"><div class="rk-img">'+IC[e.ct]+'</div><div class="rk-info"><div class="rk-title">'+e.t+'</div><div class="rk-sub"><div class="rk-sub-loc">'+e.ct+' · '+(e.district||gr(e))+'</div><div class="rk-sub-date">'+fmtRange(e.sd,e.ed)+'</div></div></div>'+thermo(t)+'</div>';
    });
  }
  document.getElementById("page-tag").innerHTML=h;
}
function likeEv(id){
  if(liked.has(id))return;
  liked.add(id);
  localStorage.setItem('snr_lk',JSON.stringify(Array.from(liked)));
  var e=ev.find(function(x){return x.id===id;});
  if(e){
    e.lc=(e.lc||0)+1;
    var lcMap=JSON.parse(localStorage.getItem('snr_lc')||'{}');
    lcMap[id]=(lcMap[id]||0)+1;
    localStorage.setItem('snr_lc',JSON.stringify(lcMap));
  }
  renderDetail(id);
}
function toggleBm(id){
  var wasBookmarked=bookmarked.has(id);
  if(wasBookmarked)bookmarked.delete(id);
  else bookmarked.add(id);
  localStorage.setItem('snr_bm',JSON.stringify(Array.from(bookmarked)));
  // bc 카운트 증감
  var e=ev.find(function(x){return x.id===id;});
  if(e){
    e.bc=(e.bc||0)+(wasBookmarked?-1:1);
    if(e.bc<0)e.bc=0;
    var bcMap=JSON.parse(localStorage.getItem('snr_bc')||'{}');
    bcMap[id]=(bcMap[id]||0)+(wasBookmarked?-1:1);
    if(bcMap[id]<0)bcMap[id]=0;
    localStorage.setItem('snr_bc',JSON.stringify(bcMap));
  }
  if(curPage==='detail')renderDetail(id);
  else if(curPage==='my')renderMy();
}

  h+='</div>';body.innerHTML=h;
}
function doS(q){document.getElementById("sInput").value=q;document.getElementById("sClr").style.display="flex";saveSH(q);renderSBody(q);}
function saveSH(q){sHist=[q].concat(sHist.filter(function(x){return x!==q;})).slice(0,10);localStorage.setItem("snr_sh",JSON.stringify(sHist));}
function delSH(i){sHist.splice(i,1);localStorage.setItem("snr_sh",JSON.stringify(sHist));renderSBody("");}
function clrSH(){sHist=[];localStorage.setItem("snr_sh","[]");renderSBody("");}

/* 리뷰 */
function openRv(id){rvId=id;rvRating=0;document.getElementById("rvTa").value="";document.getElementById("rvSubmit").disabled=true;var e=ev.find(function(x){return x.id===id;});document.getElementById("rvSub").textContent=e?e.t:"";rstars();document.getElementById("rvOverlay").classList.add("show");}
function closeRv(){document.getElementById("rvOverlay").classList.remove("show");rvId=null;rvRating=0;}
function rstars(){var el=document.getElementById("rvStars");var h="";for(var i=1;i<=5;i++){h+='<span class="rv-star'+(i<=rvRating?' on':'')+'\" onclick="setR('+i+')" style="font-size:28px;color:'+(i<=rvRating?'#ffd60a':'#2a2a38')+'">●</span>';}el.innerHTML=h;}
function setR(r){rvRating=r;rstars();chkRv();}
function chkRv(){var txt=document.getElementById("rvTa").value.trim();document.getElementById("rvSubmit").disabled=!(rvRating>0&&txt.length>=10);}
function submitRv(){var txt=document.getElementById("rvTa").value.trim();if(rvRating===0||txt.length<10)return;var nicks=["여행러","리뷰어","손난로유저","문화덕후","이벤트러버"];var nick=nicks[Math.floor(Math.random()*nicks.length)];var rv={id:"r"+Date.now(),name:nick,rating:rvRating,text:txt,date:"2026-04-05",avatar:nick.charAt(0)};if(!rvDB[rvId])rvDB[rvId]=[];rvDB[rvId].unshift(rv);localStorage.setItem("snr_rv",JSON.stringify(rvDB));var id=rvId;closeRv();alert("✅ 리뷰가 등록되었습니다!");renderDetail(id);}

/* 네비 */

    calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="12" cy="15" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/></svg>',
    explore:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>',
    my:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'
  };
  var labels={home:"홈",ranking:"랭킹",calendar:"캘린더",explore:"탐색",my:"MY"};

  var html='';
  // 홈
  html+='<button class="bnav-i" data-k="home" onclick="curNav=\'home\';go(\'home\')"><div class="nav-ic">'+icons.home+'</div><span>'+labels.home+'</span></button>';
  // 캘린더
  html+='<button class="bnav-i" data-k="calendar" onclick="curNav=\'calendar\';go(\'calendar\')"><div class="nav-ic">'+icons.calendar+'</div><span>'+labels.calendar+'</span></button>';
  // 랭킹 - 온도계 아이콘
  html+='<button class="bnav-center" data-k="ranking" onclick="curNav=\'ranking\';go(\'ranking\')" style="cursor:pointer">'
    +'<div class="bnav-center-btn">'
      // 온도계 SVG — 메인 로고와 동일
      +'<svg width="20" height="20" viewBox="0 0 24 24" fill="none">'
        +'<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" fill="rgba(255,255,255,0.22)" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>'
        +'<circle cx="11.5" cy="17.5" r="1.9" fill="white"/>'
        +'<rect x="10.3" y="8.5" width="2.4" height="7" rx="1.2" fill="white"/>'
      +'</svg>'
    +'</div>'
    +'<span class="bnav-center-label">온도랭킹</span>'
  +'</button>';
  // 탐색
  html+='<button class="bnav-i" data-k="explore" onclick="curNav=\'explore\';go(\'explore\')"><div class="nav-ic">'+icons.explore+'</div><span>'+labels.explore+'</span></button>';
  // MY
  html+='<button class="bnav-i" data-k="my" onclick="curNav=\'my\';go(\'my\')"><div class="nav-ic">'+icons.my+'</div><span>'+labels.my+'</span></button>';

  document.getElementById("bnav").innerHTML=html;
}

function updateNav(){
  document.querySelectorAll(".bnav-i,.bnav-center").forEach(function(b){
    b.classList.toggle("on",b.dataset.k===curNav);
  });
}

/* 초기화 */
renderNav();

  var grid=document.getElementById("regionGrid");
  if(grid)grid.innerHTML=REG.map(function(r){return'<button class="region-item'+(cRegion===r?' on':'')+'\" onclick="selectRegion(\''+r+'\')">'+r+'</button>';}).join('');

initApp();
